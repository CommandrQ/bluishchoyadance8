<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Tool - Glassmorphism</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>

    <div id="alert-modal" class="modal-overlay hidden">
        <div class="modal-glass">
            <h3 class="modal-title">⚠️ Severe Weather Alert</h3>
            <p id="modal-text">Loading alert details...</p>
            <button class="apple-btn close-btn" onclick="closeModal()">Dismiss</button>
        </div>
    </div>

    <div class="container">
        <main class="glass-panel main-dashboard">
            
            <div class="search-section">
                <input type="text" id="manual-location-input" class="apple-input" placeholder="Enter US ZIP Code or City...">
                <button class="apple-btn" onclick="manualSearch()">Scan Location</button>
            </div>

            <h1 id="city-name">System Standby</h1>
            <div id="threat-indicator" class="threat-pill" style="background: rgba(255,255,255,0.2);">Awaiting Location Input...</div>

            <div class="condition-box">
                <span class="label">Current Conditions</span>
                <span class="value" id="val-condition">--</span>
            </div>

            <div class="weather-grid">
                <div class="data-box">
                    <span class="label">Temperature</span>
                    <span class="value" id="val-temp">--°F</span>
                </div>
                <div class="data-box">
                    <span class="label">Humidity</span>
                    <span class="value" id="val-humidity">--%</span>
                </div>
                <div class="data-box">
                    <span class="label">Wind</span>
                    <span class="value" id="val-wind">-- mph <span id="val-wind-dir"></span></span>
                </div>
                <div class="data-box">
                    <span class="label">Gusts</span>
                    <span class="value" id="val-gusts">-- mph</span>
                </div>
            </div>

            <button class="apple-btn outline-btn" onclick="toggleAdvanced()">View Advanced Data</button>
            
            <div id="advanced-data" class="advanced-section hidden">
                <p id="local-alert-text" class="alert-text-muted">No location set.</p>
                <div style="font-size: 0.85em; color: rgba(255,255,255,0.7); margin-top: 10px;">
                    Refresh Rate: <span id="val-refresh">Paused</span><br>
                    Last Updated: <span id="val-time">--:--</span>
                </div>
            </div>
        </main>

        <section class="glass-panel alerts-section">
            <h2>State Alerts Finder</h2>
            <div class="state-search">
                <select id="state-select" class="apple-input">
                    <option value="">Select a State...</option>
                    <option value="TX">Texas</option>
                    <option value="OK">Oklahoma</option>
                    <option value="KS">Kansas</option>
                    <option value="MO">Missouri</option>
                    <option value="IA">Iowa</option>
                    <option value="NE">Nebraska</option>
                    <option value="SD">South Dakota</option>
                    <option value="MN">Minnesota</option>
                    <option value="IL">Illinois</option>
                    <option value="KY">Kentucky</option>
                </select>
                <button class="apple-btn" onclick="fetchStateAlerts()">Search</button>
            </div>
            <div id="state-alerts-results" class="results-box">
                Select a state to view active NWS warnings.
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
